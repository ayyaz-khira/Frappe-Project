{% extends "templates/web.html" %}

{% block style %}
<!-- Tailwind CSS and Modern Light Aesthetic Styles -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Outfit', sans-serif !important;
        background-color: #f9fafb !important;
        color: #1a202c;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    .bg-light-mesh {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-color: #f9fafb;
        background-image:
            radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.05) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
            radial-gradient(at 0% 100%, rgba(168, 85, 247, 0.05) 0px, transparent 50%);
    }

    .login-card {
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        border-radius: 24px;
        transition: transform 0.3s ease;
    }

    .input-field {
        background: #fdfdfd;
        border: 1.5px solid #e2e8f0;
        color: #1a202c;
        transition: all 0.2s ease;
    }

    .input-field:focus {
        border-color: #5CB9CE;
        background: #fff;
        outline: none;
        box-shadow: 0 0 0 4px rgba(92, 185, 206, 0.1);
    }

    .submit-btn {
        background: linear-gradient(135deg, #5CB9CE 0%, #4facbe 100%);
        color: white;
        transition: all 0.3s ease;
        box-shadow: 0 10px 15px -3px rgba(92, 185, 206, 0.3);
    }

    .submit-btn:hover:not([disabled]) {
        transform: translateY(-1px);
        box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        filter: brightness(1.05);
    }
    
    .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
</style>
{% endblock %}

{% block content %}
<div class="bg-light-mesh"></div>

<main class="w-full min-h-screen flex flex-col items-center justify-center px-4 py-20">
    <div class="w-full max-w-md">
        <!-- Logo/Branding -->
        <div class="text-center flex flex-col items-center mb-10">
            <div class="flex items-center mb-8">
                <!-- Square Box for Nμ -->
                <div class="flex items-center justify-center border-[1.5px] border-slate-900 w-[42px] h-[42px]">
                    <span
                        class="font-sans text-[24px] font-medium leading-none tracking-tight flex items-baseline text-slate-900 uppercase">
                        N<span class="text-[18px] ml-[0.5px] lowercase">μ</span>
                    </span>
                </div>
                <!-- Omics text outside -->
                <span class="font-sans text-[24px] font-normal tracking-tight ml-2.5 pr-2 text-slate-900">
                    Omics
                </span>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">{{ _("Reset Password") }}</h1>
            <p class="text-slate-500 font-medium mt-2">Secure your account with a new password.</p>
        </div>

        <!-- Password Reset Card -->
        <div class="login-card p-10 overflow-hidden relative">
            <form id="reset-password-form" class="space-y-6">
                <!-- New Password -->
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">New Password</label>
                    <div class="relative">
                        <input type="password" id="new_password" class="input-field w-full rounded-xl pl-4 pr-12 py-3.5 font-medium"
                            placeholder="••••••••" required autocomplete="new-password">
                        <button type="button" onclick="togglePasswordVisibility('new_password', 'eye-icon-1')" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-[#5CB9CE] transition-colors focus:outline-none">
                            <svg id="eye-icon-1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirm_password" class="input-field w-full rounded-xl pl-4 pr-12 py-3.5 font-medium"
                            placeholder="••••••••" required autocomplete="new-password">
                        <button type="button" onclick="togglePasswordVisibility('confirm_password', 'eye-icon-2')" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-[#5CB9CE] transition-colors focus:outline-none">
                            <svg id="eye-icon-2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    <p id="password-mismatch" class="hidden text-red-500 text-[11px] font-bold mt-2 ml-1">Passwords do not match</p>
                </div>

                <div class="pt-2">
                    <button type="submit" id="update-btn" disabled
                        class="submit-btn w-full py-4 rounded-xl font-bold text-base tracking-wide uppercase transition-all">
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}

{% block script %}
<script>
    function togglePasswordVisibility(inputId, iconId) {
        const pwdInput = document.getElementById(inputId);
        const eyeIcon = document.getElementById(iconId);
        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
            eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />`;
        } else {
            pwdInput.type = 'password';
            eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
        }
    }

    frappe.ready(function() {
        const key = frappe.utils.get_url_arg('key');
        const updateBtn = document.getElementById('update-btn');
        const newPwd = document.getElementById('new_password');
        const confPwd = document.getElementById('confirm_password');
        const mismatchError = document.getElementById('password-mismatch');

        function validateInputs() {
            const match = newPwd.value === confPwd.value;
            const filled = newPwd.value.length > 0 && confPwd.value.length > 0;
            
            if (confPwd.value.length > 0 && !match) {
                mismatchError.classList.remove('hidden');
            } else {
                mismatchError.classList.add('hidden');
            }

            updateBtn.disabled = !(match && filled);
        }

        newPwd.oninput = validateInputs;
        confPwd.oninput = validateInputs;

        document.getElementById('reset-password-form').onsubmit = function(e) {
            e.preventDefault();
            
            frappe.call({
                method: "frappe.core.doctype.user.user.update_password",
                args: {
                    key: key,
                    new_password: newPwd.value,
                    logout_all_sessions: 1
                },
                btn: $(updateBtn),
                callback: function(r) {
                    if(!r.exc) {
                        frappe.msgprint({
                            title: "{{ _('Success') }}",
                            message: "Your password has been updated. Redirecting to login...",
                            indicator: 'green'
                        });
                        
                        setTimeout(function() {
                            window.location.href = "/login?status=password_set";
                        }, 2000);
                    }
                }
            });
        };
    });
</script>
{% endblock %}
